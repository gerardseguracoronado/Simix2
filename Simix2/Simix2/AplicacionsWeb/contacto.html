<main>
  <h2 style="text-align:center; padding:2rem;">Contacto</h2>
  
  <div class="card" style="max-width:600px; margin:auto;">
    <p style="text-align:center; color:var(--muted);">¿Tienes alguna pregunta o sugerencia?</p>
    
    <form>
      <div class="input-group">
        <input type="text" placeholder="Tu nombre" required>
      </div>
      <div class="input-group">
        <input type="email" placeholder="Tu email" required>
      </div>
      <div class="input-group">
        <textarea placeholder="Tu mensaje" rows="5" style="width:100%; padding:1rem; border:2px solid rgba(255,255,255,0.08); border-radius:12px; background:rgba(15,18,32,0.8); color:var(--text);"></textarea>
      </div>
      <button type="submit">Enviar mensaje</button>
    </form>
    
    <p style="text-align:center; margin-top:2rem; color:var(--muted);">
      <strong>Email:</strong> contacto@cinewiki.com<br>
      <strong>Web:</strong> www.cinewiki.com
    </p>
  </div>
