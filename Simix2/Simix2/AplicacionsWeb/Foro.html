<main class="detalle">
  <h2>Foro de la comunidad</h2>

  <input type="text" id="usuario" placeholder="Tu nombre"><br><br>
  <textarea id="mensaje" placeholder="Escribe un comentario"></textarea><br><br>
  <button onclick="publicar()">Publicar</button>

  <h3>Comentarios:</h3>
  <div id="comentarios"></div>
</main>

<script>
function publicar() {
  let user = document.getElementById("usuario").value;
  let msg = document.getElementById("mensaje").value;

  if(user === "" || msg === "") return;

  let comentario = document.createElement("p");
  comentario.innerHTML = "<strong>" + user + ":</strong> " + msg;

  document.getElementById("comentarios").appendChild(comentario);

  document.getElementById("mensaje").value = "";
}
</script>

</body>
